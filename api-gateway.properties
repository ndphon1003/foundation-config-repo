server.port=8080
spring.application.name=api-gateway

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# USER SERVICE
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**

# PRODUCT SERVICE
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/product/**

# CART SERVICE
spring.cloud.gateway.routes[3].id=cart-service
spring.cloud.gateway.routes[3].uri=localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/cart/**

# Cấu hình jwt
jwt.secret=my_super_secret_key_which_is_long_enough_123456789
jwt.access.expiration=3600000
jwt.refresh.expiration=86400000
