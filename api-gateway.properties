server.port=8080
spring.application.name=api-gateway

# ==================== ROUTES ====================

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# USER SERVICE
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

# PRODUCT SERVICE
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/product/**

# CART SERVICE
spring.cloud.gateway.routes[3].id=cart-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/cart/**

# ==================== SWAGGER DOCS ROUTES ====================

# AUTH SERVICE DOCS
spring.cloud.gateway.routes[4].id=auth-service-docs
spring.cloud.gateway.routes[4].uri=http://localhost:8081
spring.cloud.gateway.routes[4].predicates[0]=Path=/auth/v3/api-docs,/auth/v3/api-docs/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/auth(?<segment>.*), $\{segment}

spring.cloud.gateway.routes[5].id=user-service-docs
spring.cloud.gateway.routes[5].uri=http://localhost:8082
spring.cloud.gateway.routes[5].predicates[0]=Path=/user/v3/api-docs,/user/v3/api-docs/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/user(?<segment>.*), $\{segment}

spring.cloud.gateway.routes[6].id=product-service-docs
spring.cloud.gateway.routes[6].uri=http://localhost:8083
spring.cloud.gateway.routes[6].predicates[0]=Path=/product/v3/api-docs,/product/v3/api-docs/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/product(?<segment>.*), $\{segment}

spring.cloud.gateway.routes[7].id=cart-service-docs
spring.cloud.gateway.routes[7].uri=http://localhost:8084
spring.cloud.gateway.routes[7].predicates[0]=Path=/cart/v3/api-docs,/cart/v3/api-docs/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/cart(?<segment>.*), $\{segment}

# ==================== JWT ====================
jwt.secret=my_super_secret_key_which_is_long_enough_123456789
jwt.access.expiration=3600000
jwt.refresh.expiration=86400000

# ==================== SWAGGER UI ====================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs

springdoc.swagger-ui.urls[1].name=user-service
springdoc.swagger-ui.urls[1].url=/user/v3/api-docs

springdoc.swagger-ui.urls[2].name=product-service
springdoc.swagger-ui.urls[2].url=/product/v3/api-docs

springdoc.swagger-ui.urls[3].name=cart-service
springdoc.swagger-ui.urls[3].url=/cart/v3/api-docs

# ==================== CORS ====================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false